spring.application.name=checkout-service
server.port=8083

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/checkout_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:checkout_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:checkout_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

nats.url=${NATS_URL:nats://localhost:4222}
nats.subject.checkout.init=v1.checkout.init
nats.subject.checkout.confirm=v1.checkout.confirm
nats.subject.cart.get=v1.cart.get
nats.subject.cart.clear=v1.cart.clear
nats.subject.product.get=v1.catalog.product.get
nats.subject.product.update=v1.catalog.product.update

paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
paypal.return-url=${PAYPAL_RETURN_URL:http://localhost:3000/checkout/success}
paypal.cancel-url=${PAYPAL_CANCEL_URL:http://localhost:3000/checkout/cancel}
